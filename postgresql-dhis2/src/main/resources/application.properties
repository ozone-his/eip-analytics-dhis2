# PostgreSQL Configuration
postgresql.jdbc.url=jdbc:postgresql://localhost:5432/analytics
postgresql.username=postgres
postgresql.password=postgres
postgresql.pool.max.size=10

# EIP Home directory for storing sync state and other files
eip.home=/eip-home

# PostgreSQL Query Configuration
# Cron expression for scheduling (default: 0 */2 * * * ? = every 2 minutes)
# Format: second minute hour day month weekday
# Examples: 0 */5 * * * ? (every 5 minutes), 0 0 * * * ? (every hour), 0 0 0 * * ? (daily at midnight)
postgresql.query.cron=0 */2 * * * ?

# SQL query to extract data from PostgreSQL
# NOTE: If dhis2-mappings.yml is configured, the SQL from the configuration file will be used instead
# This query is used as a fallback if no configuration file is found
# This query should return columns that can be mapped to DHIS2 data elements
postgresql.query.sql=SELECT test_date, facility_id, facility_name, test_type, patient_age, patient_gender, test_result, test_count, calculate_period(test_date) as period FROM lims_test_results WHERE test_date > :#lastSyncTimestamp ORDER BY test_date, facility_id LIMIT 1000

# DHIS2 Configuration
dhis2.base.url=http://localhost:8080
dhis2.username=admin
dhis2.password=district

# ActiveMQ Artemis Configuration for Dead Letter Queue
# Broker URL format: tcp://hostname:port or failover:(tcp://host1:port,tcp://host2:port)
artemis.broker.url=tcp://artemis:61616
artemis.username=artemis
artemis.password=artemis
artemis.pool-size=10

# Camel JMS Configuration
camel.component.jms.connection-factory=#bean:connectionFactory
camel.component.jms.concurrent-consumers=1
camel.component.jms.reply-to-on-message-listener=true

# Transformation DSL Configuration
# Leave empty to use default transformation, or provide Groovy DSL script
# Example DSL:
# transformation.dsl=return [dataSet: data.dataSet, period: data.period, orgUnit: data.orgUnit, dataValues: [[dataElement: data.dataElement, categoryOptionCombo: data.categoryOptionCombo, value: data.value]]]
transformation.dsl=

# Logging Configuration
logging.level.com.ozonehis.eip.dhis2=INFO
logging.level.org.apache.camel=INFO
