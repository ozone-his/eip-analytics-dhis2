reports:
  - id: lims-pcr-facility-a
    name: LIMS PCR test results - Facility A
    description: Aggregated PCR results for Facility A (set DHIS2 orgUnit UID below)
    dataSet: BfMAe6Itzgt
    sql: |
      SELECT
        'BfMAe6Itzgt' AS data_set,
        TO_CHAR(test_date, 'YYYYMM') AS period,
        SUM(CASE WHEN test_result = 'positive' THEN test_count ELSE 0 END) AS positive_tests,
        SUM(CASE WHEN test_result = 'negative' THEN test_count ELSE 0 END) AS negative_tests,
        SUM(CASE WHEN test_result = 'positive' AND patient_gender = 'M' THEN test_count ELSE 0 END) AS positive_male,
        SUM(CASE WHEN test_result = 'positive' AND patient_gender = 'F' THEN test_count ELSE 0 END) AS positive_female,
        SUM(test_count) AS total_tests
      FROM lims_test_results
      WHERE test_date > :#lastSyncTimestamp AND facility_id = 'FACILITY_A'
      GROUP BY TO_CHAR(test_date, 'YYYYMM')
      ORDER BY period

    groupBy:
      dataSet: data_set
      period: period
      orgUnit: ImspTQPwCqd

    dataValueMappings:
      - name: Positive tests (total)
        dataElement: Fu5yaroCXiZ
        valueColumn: positive_tests
        categoryOptionCombo: HllvX50cXC0

      - name: Negative tests (total)
        dataElement: gJaB7Ne6k7c
        valueColumn: negative_tests
        categoryOptionCombo: HllvX50cXC0

      - name: Positive tests (male)
        dataElement: OMYdA6qs2qI
        valueColumn: positive_male
        categoryOptionCombo: HllvX50cXC0

      - name: Positive tests (female)
        dataElement: Aytls9Fx4y5
        valueColumn: positive_female
        categoryOptionCombo: HllvX50cXC0

      - name: Total tests
        dataElement: Fm6cUmmiY3d
        valueColumn: total_tests
        categoryOptionCombo: HllvX50cXC0

